appId: com.sts.esm
productName: ESM
artifactName: ESM-Setup-${version}.exe
files:
  - "**/*"
  - "!**/.git"
  - "!**/dist/**"
  - "!main.js"
  - "!preload.js"
win:
  target:
    - nsis
  icon: assets/esm-icon-2.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
